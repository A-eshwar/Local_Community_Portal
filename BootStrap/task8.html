<body>
    <p class="display-6 d-flex justify-content-center m-5 fw-bold">Registration</p>
    <div class="bg-warning m-4 p-2 rounded text-dark">
        <div class="mb-3 m-3 p-3">
            <label for="username" class="form-label">Username:</label>
            <input type="text" id="username" class="form-control" placeholder="bunny">
            <label for="email" class="form-label">Email</label>
            <input type="eamil" id="email" class="form-control" placeholder="example@gmail.com">
            <label for="password" class="form-label">Password:</label>
            <input type="password" id="password" class="form-control" aria-describedby="passwordHelpInline">
            <span id="passwordHelpInline" class="form-text">
                Must be 8-20 characters long.
            </span>
            <br>
            <label for="password" class="form-label">Confirm Password:</label>
            <input type="password" id="password" class="form-control">
            <br>
            <button class="btn bg-primary">Submit</button>
        </div>
    </div>
